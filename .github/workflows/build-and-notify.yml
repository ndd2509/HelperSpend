# ============================================================================
# HelperSpend - Build Android & Telegram Notify
# ============================================================================

name: 🚀 Build & Notify

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    name: 🤖 Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 📦 Install dependencies
        run: yarn install

      - name: 🔨 Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HelperSpend-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  notify:
    name: 📨 Telegram Notify
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always()

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📨 Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_STATUS: ${{ needs.build-android.result }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$BUILD_STATUS" = "success" ]; then
            EMOJI="✅"
            TEXT="THÀNH CÔNG"
          else
            EMOJI="❌"
            TEXT="THẤT BẠI"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"

          MESSAGE="${EMOJI} *HelperSpend Build ${TEXT}*

          📦 Android Release APK
          🌿 Branch: \`${BRANCH}\`
          👤 Author: ${COMMIT_AUTHOR}
          💬 Commit: \`${SHORT_SHA}\`
          📝 ${COMMIT_MSG}

          🔗 [Xem chi tiết](${RUN_URL})"

          if [ "$BUILD_STATUS" = "success" ]; then
            MESSAGE="${MESSAGE}
          📥 [Tải APK](${RUN_URL}#artifacts)"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": $(echo "$MESSAGE" | jq -Rs .),
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }" || echo "Telegram notification failed"
