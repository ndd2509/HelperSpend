# ============================================================================
# HelperSpend - Android Build
# ============================================================================
# Builds Android APK (debug) and AAB (release)
# Triggers: push to main, manual dispatch
# ============================================================================

name: CD - Android Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'ios/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    name: 🤖 Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐘 Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 📦 Install JS dependencies
        run: yarn install

      # ─── Release keystore (chỉ cần cho release build) ───
      - name: 🔐 Decode release keystore
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      # ─── Debug Build ───
      - name: 🔨 Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -PnewArchEnabled=true

      # ─── Release Build ───
      - name: 🚀 Build Release AAB
        if: github.event.inputs.build_type == 'release'
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon -PnewArchEnabled=true
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ─── Upload artifacts ───
      - name: 📤 Upload Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: 📤 Upload Release AAB
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
