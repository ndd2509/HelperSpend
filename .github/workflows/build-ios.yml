# ============================================================================
# HelperSpend - iOS Build
# ============================================================================
# Builds iOS app for simulator (debug) or archive for distribution (release)
# Triggers: push to main, manual dispatch
# ============================================================================

name: CD - iOS Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: 📦 Install JS dependencies
        run: yarn install --immutable

      - name: 💎 Setup Ruby & Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # ─── CocoaPods Cache ───
      - name: 🗂️ Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: 📱 Install CocoaPods
        working-directory: ios
        run: bundle exec pod install --repo-update

      # ─── Debug Build (Simulator) ───
      - name: 🔨 Build for Simulator (Debug)
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        run: |
          xcodebuild \
            -workspace ios/HelperSpend.xcworkspace \
            -scheme HelperSpend \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath ios/build \
            clean build \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      # ─── Release Build (Archive) ───
      - name: 🔐 Install Apple certificate & provisioning profile
        if: github.event.inputs.build_type == 'release'
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: 🚀 Archive & Export IPA
        if: github.event.inputs.build_type == 'release'
        run: |
          xcodebuild \
            -workspace ios/HelperSpend.xcworkspace \
            -scheme HelperSpend \
            -configuration Release \
            -archivePath ios/build/HelperSpend.xcarchive \
            archive | xcpretty

          xcodebuild \
            -exportArchive \
            -archivePath ios/build/HelperSpend.xcarchive \
            -exportPath ios/build/export \
            -exportOptionsPlist ios/exportOptions.plist | xcpretty

      # ─── Upload artifacts ───
      - name: 📤 Upload Debug Build
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-build
          path: ios/build/Build/Products/Debug-iphonesimulator/HelperSpend.app
          retention-days: 7

      - name: 📤 Upload Release IPA
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: ios/build/export/*.ipa
          retention-days: 30

      # ─── Cleanup ───
      - name: 🧹 Clean up keychain
        if: always() && github.event.inputs.build_type == 'release'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
