buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath('com.google.gms:google-services:4.4.4')
    }
}

apply plugin: "com.facebook.react.rootproject"

// Ensure hermes-engine prefab is available for all native modules (fixes CI build)
subprojects { subproject ->
    afterEvaluate {
        if (subproject.plugins.hasPlugin("com.android.library")) {
            def hasCmake = subproject.android.externalNativeBuild?.cmake?.path != null
            if (hasCmake) {
                subproject.android.buildFeatures.prefab = true
                subproject.dependencies.add("implementation", "com.facebook.react:hermes-android")
            }
        }
    }
}
